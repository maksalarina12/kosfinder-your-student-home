<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <title>KosFinder</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // Rewrites /kosfinder-your-student-home/some/path to
      // /kosfinder-your-student-home/?/some/path so index.html can restore it.
      (function () {
        var segmentCount = 1; // number of path segments to keep (repo name)
        var l = window.location;
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname
              .split("/")
              .slice(0, 1 + segmentCount)
              .join("/") +
            "/?/" +
            l.pathname
              .slice(1)
              .split("/")
              .slice(segmentCount)
              .join("/")
              .replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
